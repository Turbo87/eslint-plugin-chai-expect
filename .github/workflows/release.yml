name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write # semantic-release: push release commit, tag, and changelog
  issues: write # semantic-release: comment on released issues
  pull-requests: write # semantic-release: comment on released pull requests
  id-token: write # npm: trusted publishing via OIDC

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.x

      - run: yarn install --frozen-lockfile
      - run: yarn test

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - run: yarn install --frozen-lockfile
      - run: npm install --no-save semantic-release @semantic-release/changelog @semantic-release/git
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
